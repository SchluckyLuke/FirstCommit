<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bio Karteikarten</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #303055;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 {
      margin-bottom: 20px;
      color: rgb(225, 232, 255);
    }
    .card-container {
      width: 350px;
      height: 220px;
      perspective: 1000px;
      margin-bottom: 20px;
    }
    .card {
      width: 100%;
      height: 100%;
      background: rgb(131, 118, 209);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }
    .card.flip {
      transform: rotateY(180deg);
    }
    .side {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: 18px;
    }
    .front {
      background: #a4acdd;
    }
    .back {
      background: #788fd6;
      transform: rotateY(180deg);
    }
    button {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #4a63ff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin: 10px;
    }
    #zurückBtn{
        margin-top: 40px;
    }
  </style>
</head>
<body>
  <h1>Bio-Karteikarten</h1>
  <div class="card-container">
    <div class="card" id="card">
      <div class="side front" id="front"></div>
      <div class="side back" id="back"></div>
    </div>
  </div>
  <div>
    <button id="zurückBtn" onclick="prevCard()">Zurück</button>
    <button onclick="nextCard()">Weiter</button>
  </div>

  <script>
    const cards = [
      {front: "Prokaryonten (Prokaryoten)", back: "• besitzen keinen echten Zellkern \n \n •	Erbinformation liegt frei im Zellinneren \n \n •	keine membranumhüllten Organellen"},
      {front: "Eukaryonten (Eukaryoten)", back: "•	besitzen einen Zellkern \n \n • lineare DNA liegt im Zellkern (sie ist in Chromosomen organisiert) \n \n • haben Organellen(Mitochondrien)"},
      {front: "Wie entstanden die ersten Lebewesen?", back: "Aus der Ursuppe → erste Prokaryonten → später Cyanobakterien."},
      {front: "Cyanobakterien", back: "• können mithilfe von Chlorophyl, Fotosynthese betreiben \n \n • dabei setzen sie Sauerstoff frei \n \n • wichtig für heutige sauerstoffhaltige Atmosphäre"},
      {front: "Vermehrung der Bakterien", back: "• durch 2-teilung (Zelle teilt sich in zwei identische Teile) \n \n • bie guten Bedingungen (warm, feucht, nährstoffreich), können sich Bakterien etwa alle 20 min teilen"},
      {front: "Bakterienformen", back: "• Kokken(Staphylokokken): kugelförmig \n \n • Bazillen: stäbchenförmig \n \n • Vibaronen: kommaförmig"},
      {front: "Begeißelung bei Bakterien?", back: "Mit oder ohne Geißeln (mono-, lopho-, peritrich)."},
      {front: "Autotrophe Bakterien", back: "• stellen ihre Nahrung selbst durch Fotosynthese oder Chemosynthese her"},
      {front: "Heterotrophe Bakterien", back: "• müssen fertige Nährstoffe aus ihrer Umgebung aufnehmen, da sie sie nicht selbst produzieren können"},
      {front: "Schimmelpilze", back: "• sind mehrzellige Pilze \n \n • bestehen aus langen Fäden, die man Hyphen nennt \n \n • Alle Hyphen zusammen bilden das Myzel, das z. B. auf altem Brot zu sehen ist \n \n • vermehren sich durch Sporen, die besonders gut auf feuchter Nahrung wachsen"},
      {front: "Hefen", back: "• einzellige Pilze, die Zucker zu Alkohol & Kohlenstoffdioxid abbauen können \n => alkoholische Gärung \n \n • dadurch entstehen Ethanol & CO2 \n \n • Hefenwerden beim Backen, für Bier oder für Wein-Produkte verwendet"}
    ];

    let index = 10;

    const front = document.getElementById("front");
    const back = document.getElementById("back");
    const card = document.getElementById("card");

    function loadCard() {
      front.innerText = cards[index].front;
      back.innerText = cards[index].back;
      card.classList.remove("flip");
    }

    card.addEventListener("click", () => {
      card.classList.toggle("flip");
    });

    function nextCard() {
      index = (index + 1) % cards.length;
      loadCard();
    }

    function prevCard() {
      index = (index - 1 + cards.length) % cards.length;
      loadCard();
    }

    loadCard();
  </script>
</body>
</html>.
